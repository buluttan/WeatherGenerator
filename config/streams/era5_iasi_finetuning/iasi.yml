# obs_types
# 0 : polar orbiting satellites
# 1 : geostationay satellites
# 2 : conventional observations

METOPBIASI :
  type : obs
  stream_id : 1
  filenames : ['observations-ea-ofb-0001-2013-2023-metop-b-iasi-radiances-v1.zarr']
  loss_weight : 1.
  diagnostic : True
  masking_rate : 0.6
  masking_rate_none : 0.05
  token_size : 512
  embed : 
    net : transformer
    num_tokens : 1
    num_heads : 2
    dim_embed : 256
